<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf8f5">
<meta name="theme-color" content="#1e1a17" media="(prefers-color-scheme: dark)">
<title>New Session</title>
<style>
/* ================================================================
   TOKENS — Japanese Sport / Vermilion (matches Design System.html)
   ================================================================ */
:root {
  --bg:       oklch(99%  0.003 50);
  --surface:  oklch(100% 0     0);
  --fg:       oklch(12%  0.02  50);
  --muted:    oklch(50%  0.01  50);
  --border:   oklch(88%  0.008 50);
  --accent:   oklch(55%  0.20  30);
  --accent-soft: oklch(96% 0.025 30);

  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text',  'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono:    ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace;

  --success:  oklch(50% 0.14 145);
  --danger:   oklch(55% 0.20 25);

  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;
  --space-4: 16px;  --space-5: 24px;  --space-6: 32px;
  --space-7: 48px;  --space-8: 64px;

  --text-xs: 11px;  --text-sm: 13px;  --text-base: 15px;
  --text-lg: 18px;  --text-xl: 24px;  --text-2xl: 32px;
  --text-3xl: 48px;

  --radius-sm: 0px;  --radius-md: 4px;  --radius-lg: 8px;
  --border-width: 1px;
}

[data-theme="dark"] {
  --bg:       oklch(12%  0.02  50);
  --surface:  oklch(15%  0.018 50);
  --fg:       oklch(95%  0.005 50);
  --muted:    oklch(55%  0.01  50);
  --border:   oklch(28%  0.015 50);
  --accent:   oklch(60%  0.18  30);
  --accent-soft: oklch(22% 0.04 30);
  --success:  oklch(55% 0.12 145);
  --danger:   oklch(60% 0.18 25);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: none;
}

body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.5;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}

/* ================================================================
   SCREEN SHELL
   ================================================================ */
.screen {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
}

@media (min-width: 600px) {
  body { background: var(--border); }
  .screen {
    border-left: var(--border-width) solid var(--border);
    border-right: var(--border-width) solid var(--border);
  }
}

/* ================================================================
   TOP NAV — iOS style: Cancel / Title / (no Save here; CTA at bottom)
   ================================================================ */
.nav {
  position: sticky;
  top: 0;
  z-index: 20;
  background: color-mix(in oklch, var(--bg) 88%, transparent);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  padding: max(var(--space-3), env(safe-area-inset-top) + var(--space-2)) var(--space-4) var(--space-3);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: var(--space-3);
  border-bottom: var(--border-width) solid transparent;
  transition: border-color 0.2s, background 0.2s;
}

.nav.is-stuck {
  border-bottom-color: var(--border);
}

.nav-btn {
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: 500;
  color: var(--accent);
  background: transparent;
  border: none;
  cursor: pointer;
  padding: var(--space-2) 0;
  min-height: 44px;
  text-align: left;
  letter-spacing: -0.01em;
}

.nav-btn:active { opacity: 0.55; }
.nav-btn.is-right { text-align: right; font-weight: 600; }
.nav-btn.is-disabled { color: var(--muted); pointer-events: none; }

.nav-title {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  letter-spacing: -0.01em;
  text-align: center;
  white-space: nowrap;
}

/* ================================================================
   PAGE HEADER (large title under nav)
   ================================================================ */
.page-header {
  padding: var(--space-3) var(--space-5) var(--space-6);
}

.page-title {
  font-family: var(--font-display);
  font-size: var(--text-3xl);
  font-weight: 800;
  line-height: 1.02;
  letter-spacing: -0.035em;
  margin-bottom: var(--space-2);
}

.page-subtitle {
  font-size: var(--text-sm);
  color: var(--muted);
  font-family: var(--font-mono);
}

/* ================================================================
   SCROLL AREA
   ================================================================ */
.screen-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding-bottom: max(120px, env(safe-area-inset-bottom) + 104px);
}

/* ================================================================
   FORM SECTION
   ================================================================ */
.section {
  padding: 0 var(--space-5);
  margin-bottom: var(--space-7);
}

.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.section-label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.section-action {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--accent);
  font-weight: 600;
  background: transparent;
  border: none;
  padding: var(--space-2) 0;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  min-height: 32px;
}
.section-action:active { opacity: 0.5; }
.section-action svg { width: 14px; height: 14px; }
.section-action.is-loading svg { animation: spin 0.8s linear infinite; }
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ================================================================
   NAME RECOMMENDATIONS — vertical list of selectable cards
   ================================================================ */
.suggest-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}

.suggest {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-lg);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  color: var(--fg);
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
  min-height: 56px;
  position: relative;
}

.suggest:active { background: var(--bg); }

.suggest.is-selected {
  border-color: var(--accent);
  border-width: 2px;
  padding: calc(var(--space-3) - 1px) calc(var(--space-4) - 1px);
  background: var(--surface);
}

.suggest-stamp {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: var(--bg);
  border: var(--border-width) solid var(--border);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: 800;
  color: var(--muted);
  transition: all 0.15s;
}

.suggest.is-selected .suggest-stamp {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--surface);
}

.suggest-body {
  flex: 1;
  min-width: 0;
}

.suggest-name {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: var(--fg);
}

.suggest-tag {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 3px;
}

.suggest-check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: grid;
  place-items: center;
  flex-shrink: 0;
  background: transparent;
  transition: all 0.15s;
}

.suggest.is-selected .suggest-check {
  background: var(--accent);
  border-color: var(--accent);
}

.suggest-check svg {
  width: 12px;
  height: 12px;
  color: var(--surface);
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.15s;
}

.suggest.is-selected .suggest-check svg {
  opacity: 1;
  transform: scale(1);
}

/* Skeleton — while "fetching" */
.suggest.is-skeleton {
  pointer-events: none;
  cursor: default;
}
.suggest.is-skeleton .suggest-stamp,
.suggest.is-skeleton .suggest-check {
  border-color: var(--border);
  background: var(--border);
  opacity: 0.55;
}
.suggest.is-skeleton .skel-line {
  display: block;
  height: 10px;
  background: var(--border);
  border-radius: 2px;
  opacity: 0.55;
}
.suggest.is-skeleton .skel-line + .skel-line {
  width: 40%;
  margin-top: 6px;
  height: 8px;
  opacity: 0.35;
}
.suggest.is-skeleton {
  animation: skel-pulse 1.4s ease-in-out infinite;
}
@keyframes skel-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* Custom input row */
.custom-row {
  position: relative;
  margin-top: var(--space-3);
}

.custom-divider {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin: var(--space-4) 0 var(--space-3);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.custom-divider::before,
.custom-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.input {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--fg);
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-lg);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.12s;
  min-height: 48px;
}
.input:focus {
  border-color: var(--fg);
}
.input.is-custom-active {
  border-color: var(--accent);
  border-width: 2px;
  padding: calc(var(--space-3) - 1px) calc(var(--space-4) - 1px);
}
.input::placeholder { color: var(--muted); opacity: 0.55; }

/* ================================================================
   START TIME — segmented + reveal
   ================================================================ */
.segmented {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--bg);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-lg);
  padding: 3px;
  position: relative;
  margin-bottom: var(--space-4);
}

.seg-track {
  position: absolute;
  top: 3px;
  bottom: 3px;
  width: calc(50% - 3px);
  background: var(--fg);
  border-radius: 6px;
  transition: transform 0.25s cubic-bezier(0.32, 0, 0.15, 1);
  z-index: 0;
}

.segmented[data-mode="schedule"] .seg-track {
  transform: translateX(100%);
}

.seg-btn {
  position: relative;
  z-index: 1;
  background: transparent;
  border: none;
  padding: var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  transition: color 0.2s;
  letter-spacing: -0.005em;
}

.segmented[data-mode="now"]      .seg-btn[data-mode="now"],
.segmented[data-mode="schedule"] .seg-btn[data-mode="schedule"] {
  color: var(--surface);
}

.seg-icon {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

/* Time panels */
.time-panel {
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.time-now-row {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4);
}

.live-dot {
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}

.time-now-text {
  flex: 1;
  min-width: 0;
}

.time-now-label {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 2px;
}

.time-now-value {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--fg);
  font-feature-settings: "tnum" 1;
}

.time-now-sub {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--muted);
  margin-top: 2px;
}

/* Schedule rows */
.time-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-3);
  padding: var(--space-4);
  border-bottom: var(--border-width) solid var(--border);
  min-height: 56px;
  cursor: pointer;
  background: var(--surface);
}
.time-row:last-of-type { border-bottom: none; }
.time-row:active { background: var(--bg); }

.time-row-label {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  color: var(--fg);
  font-size: var(--text-base);
  font-weight: 500;
}

.time-row-label svg {
  width: 18px;
  height: 18px;
  color: var(--muted);
  flex-shrink: 0;
}

.time-row-value {
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  font-feature-settings: "tnum" 1;
}

.time-row-value svg {
  width: 14px;
  height: 14px;
  color: var(--muted);
}

.time-row input[type="date"],
.time-row input[type="time"] {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
  border: none;
  -webkit-appearance: none;
}

.time-row {
  position: relative;
}

/* Quick chips */
.quick-row {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-top: var(--space-3);
}

.quick-chip {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--fg);
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: 999px;
  padding: var(--space-2) var(--space-4);
  cursor: pointer;
  min-height: 36px;
  transition: all 0.12s;
  -webkit-appearance: none;
  font-feature-settings: "tnum" 1;
}
.quick-chip:active { background: var(--bg); }
.quick-chip.is-active {
  background: var(--fg);
  color: var(--surface);
  border-color: var(--fg);
}

/* Schedule reveal */
.schedule-wrap {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.28s cubic-bezier(0.32, 0, 0.15, 1);
}
.schedule-wrap > div {
  overflow: hidden;
}
.schedule-wrap.is-open {
  grid-template-rows: 1fr;
}

.now-wrap {
  display: grid;
  grid-template-rows: 1fr;
  transition: grid-template-rows 0.28s cubic-bezier(0.32, 0, 0.15, 1);
}
.now-wrap > div {
  overflow: hidden;
}
.now-wrap.is-closed {
  grid-template-rows: 0fr;
}

/* ================================================================
   STICKY BOTTOM CTA
   ================================================================ */
.bottom-bar {
  position: sticky;
  bottom: 0;
  left: 0;
  right: 0;
  padding: var(--space-3) var(--space-5) max(var(--space-4), env(safe-area-inset-bottom) + var(--space-3));
  background: color-mix(in oklch, var(--bg) 92%, transparent);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-top: var(--border-width) solid var(--border);
  z-index: 15;
}

.btn-cta {
  width: 100%;
  padding: var(--space-4);
  background: var(--accent);
  color: var(--surface);
  font-family: var(--font-body);
  font-size: var(--text-base);
  font-weight: 700;
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  min-height: 52px;
  touch-action: manipulation;
  transition: opacity 0.12s, transform 0.12s;
  letter-spacing: 0.005em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  box-shadow:
    0 1px 2px oklch(0% 0 0 / 0.08),
    0 6px 18px oklch(55% 0.20 30 / 0.22);
}
.btn-cta:active { transform: scale(0.985); opacity: 0.92; }
.btn-cta:disabled, .btn-cta.is-disabled {
  background: var(--border);
  color: var(--muted);
  box-shadow: none;
  cursor: not-allowed;
}

.btn-cta-meta {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--surface);
  opacity: 0.7;
  margin-left: var(--space-1);
}
.btn-cta.is-disabled .btn-cta-meta { opacity: 1; }

/* ================================================================
   THEME TOGGLE — dev convenience
   ================================================================ */
.theme-toggle {
  position: fixed;
  bottom: max(110px, env(safe-area-inset-bottom) + 96px);
  right: var(--space-4);
  padding: var(--space-2) var(--space-3);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  border-radius: var(--radius-md);
  color: var(--muted);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  z-index: 50;
  opacity: 0.7;
}
.theme-toggle:active { opacity: 1; }

/* ================================================================
   Tiny screens
   ================================================================ */
@media (max-width: 360px) {
  .page-title { font-size: 40px; }
  .section { padding: 0 var(--space-4); }
  .nav { padding-left: var(--space-3); padding-right: var(--space-3); }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<div class="screen">

  <!-- Top navigation -->
  <nav class="nav" id="topNav">
    <button class="nav-btn" type="button" onclick="onCancel()">Cancel</button>
    <div class="nav-title">New Session</div>
    <span aria-hidden="true"></span>
  </nav>

  <div class="screen-scroll" id="scrollEl">

    <!-- Large title -->
    <header class="page-header">
      <h1 class="page-title">New session</h1>
      <p class="page-subtitle" id="headerSub">Pick a name. Set a time. Start swinging.</p>
    </header>

    <!-- ============================================================
         SECTION 1 — SESSION NAME
         ============================================================ -->
    <section class="section">
      <div class="section-head">
        <div class="section-label">Session name</div>
        <button class="section-action" id="refreshBtn" type="button" onclick="refreshSuggestions()" aria-label="Refresh suggestions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-3-6.7"></path>
            <path d="M21 4v5h-5"></path>
          </svg>
          <span id="refreshLabel">Shuffle</span>
        </button>
      </div>

      <div class="suggest-list" id="suggestList" role="radiogroup" aria-label="Suggested session names">
        <!-- Populated by JS -->
      </div>

      <div class="custom-divider">Or</div>

      <div class="custom-row">
        <input
          type="text"
          class="input"
          id="customName"
          placeholder="Type your own name…"
          maxlength="48"
          autocomplete="off"
          autocapitalize="words"
          spellcheck="false"
          onfocus="onCustomFocus()"
          oninput="onCustomInput(event)">
      </div>
    </section>

    <!-- ============================================================
         SECTION 2 — START TIME
         ============================================================ -->
    <section class="section">
      <div class="section-head">
        <div class="section-label">Start time</div>
      </div>

      <div class="segmented" id="modeSeg" data-mode="now" role="tablist" aria-label="Start time mode">
        <span class="seg-track" aria-hidden="true"></span>
        <button class="seg-btn" type="button" data-mode="now" role="tab" aria-selected="true" onclick="setMode('now')">
          <svg class="seg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="13 3 4 14 12 14 11 21 20 10 12 10 13 3"></polygon>
          </svg>
          Start now
        </button>
        <button class="seg-btn" type="button" data-mode="schedule" role="tab" aria-selected="false" onclick="setMode('schedule')">
          <svg class="seg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Schedule
        </button>
      </div>

      <!-- NOW panel -->
      <div class="now-wrap" id="nowWrap">
        <div>
          <div class="time-panel">
            <div class="time-now-row">
              <span class="live-dot" aria-hidden="true"></span>
              <div class="time-now-text">
                <div class="time-now-label">Starting in a moment</div>
                <div class="time-now-value" id="nowClock">7:42 PM</div>
                <div class="time-now-sub" id="nowDate">Today · Friday, May 22</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SCHEDULE panel -->
      <div class="schedule-wrap" id="scheduleWrap">
        <div>
          <div class="time-panel" style="margin-top:0">
            <label class="time-row" for="schedDate">
              <span class="time-row-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Date
              </span>
              <span class="time-row-value">
                <span id="schedDateLabel">Today</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </span>
              <input type="date" id="schedDate" onchange="onDateChange(event)">
            </label>

            <label class="time-row" for="schedTime">
              <span class="time-row-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                Time
              </span>
              <span class="time-row-value">
                <span id="schedTimeLabel">8:00 PM</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </span>
              <input type="time" id="schedTime" onchange="onTimeChange(event)">
            </label>
          </div>

          <div class="quick-row" role="group" aria-label="Quick times">
            <button class="quick-chip" type="button" data-quick="30"  onclick="quickPick(this, 30)">In 30 min</button>
            <button class="quick-chip" type="button" data-quick="60"  onclick="quickPick(this, 60)">In 1 hr</button>
            <button class="quick-chip" type="button" data-quick="tom" onclick="quickPickTomorrow(this)">Tomorrow 7:00 PM</button>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- Bottom CTA -->
  <div class="bottom-bar">
    <button class="btn-cta is-disabled" id="ctaBtn" type="button" onclick="onCreate()" disabled>
      <span id="ctaLabel">Pick a name to continue</span>
    </button>
  </div>

  <button class="theme-toggle" type="button" onclick="toggleTheme()">Theme</button>
</div>

<script>
/* ================================================================
   Mock API — session-name recommendations
   Returns 3–5 names; rotates pools so "Shuffle" produces fresh ones.
   ================================================================ */
const NAME_POOLS = [
  [
    { name: "Friday Night Smash",       tag: "Recurring · Fridays 7pm" },
    { name: "Tuan's Comeback",          tag: "Based on recent form" },
    { name: "May Madness Round 4",      tag: "Series · 3 of 5 played" },
    { name: "After-Work Doubles",       tag: "Casual · 4–6 players" },
  ],
  [
    { name: "Court 3 Showdown",         tag: "Same court as last week" },
    { name: "Minh vs The World",        tag: "Suggested rivalry" },
    { name: "Saturday Morning Drills",  tag: "Coaching · 90 min" },
    { name: "Birthday Bash — Huy",      tag: "Special occasion" },
    { name: "Rookies Cup",              tag: "Beginners welcome" },
  ],
  [
    { name: "Office League Match 7",    tag: "Workplace · weekly" },
    { name: "Sunday Shuttle Club",      tag: "Open play · all levels" },
    { name: "Doubles Ladder Night",     tag: "Ranked · 5 matches" },
    { name: "Khoa's Revenge",           tag: "Rematch from May 18" },
  ],
  [
    { name: "Pre-Tournament Tune-Up",   tag: "Prep · 4 sets" },
    { name: "Mixed Doubles Mixer",      tag: "Social · rotate teams" },
    { name: "Late Night Rally",         tag: "10pm · Court 2" },
    { name: "Best of the Bench",        tag: "B-team showcase" },
    { name: "Champions Circle",         tag: "Top 4 rated players" },
  ],
];

let poolIdx = 0;
let selectedName = null;     // string | null
let mode = "now";            // "now" | "schedule"
let scheduledAt = null;      // Date | null

const el = (id) => document.getElementById(id);

/* ============ Suggestion list ============ */
function renderSkeletons(n = 4) {
  const list = el("suggestList");
  list.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const row = document.createElement("div");
    row.className = "suggest is-skeleton";
    row.innerHTML = `
      <div class="suggest-stamp"></div>
      <div class="suggest-body">
        <span class="skel-line" style="width:${55 + Math.random() * 30}%"></span>
        <span class="skel-line"></span>
      </div>
      <div class="suggest-check"></div>`;
    list.appendChild(row);
  }
}

function renderSuggestions(items) {
  const list = el("suggestList");
  list.innerHTML = "";
  items.forEach((item, idx) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "suggest";
    btn.setAttribute("role", "radio");
    btn.setAttribute("aria-checked", "false");
    btn.dataset.name = item.name;
    btn.innerHTML = `
      <div class="suggest-stamp">${(idx + 1)}</div>
      <div class="suggest-body">
        <div class="suggest-name">${escapeHtml(item.name)}</div>
        <div class="suggest-tag">${escapeHtml(item.tag)}</div>
      </div>
      <div class="suggest-check" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>`;
    btn.addEventListener("click", () => selectSuggestion(item.name));
    list.appendChild(btn);
  });
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

async function fetchSuggestions() {
  // Simulate API: 3–5 names from current pool
  const pool = NAME_POOLS[poolIdx % NAME_POOLS.length];
  const count = 3 + ((poolIdx % 3)); // 3, 4, 5
  await new Promise(r => setTimeout(r, 480));
  return pool.slice(0, count);
}

async function loadSuggestions() {
  renderSkeletons(4);
  const btn = el("refreshBtn");
  btn.classList.add("is-loading");
  el("refreshLabel").textContent = "Loading";
  try {
    const items = await fetchSuggestions();
    renderSuggestions(items);
    // Reflect prior selection if it still exists
    if (selectedName) {
      const match = items.find(i => i.name === selectedName);
      if (match) selectSuggestion(selectedName, /*scroll*/ false);
      else { selectedName = null; updateCTA(); }
    }
  } finally {
    btn.classList.remove("is-loading");
    el("refreshLabel").textContent = "Shuffle";
  }
}

function refreshSuggestions() {
  poolIdx = (poolIdx + 1) % NAME_POOLS.length;
  loadSuggestions();
}

function selectSuggestion(name, scroll = true) {
  selectedName = name;
  // Clear custom field highlight
  const custom = el("customName");
  custom.value = "";
  custom.classList.remove("is-custom-active");

  document.querySelectorAll(".suggest").forEach(s => {
    const on = s.dataset.name === name;
    s.classList.toggle("is-selected", on);
    s.setAttribute("aria-checked", on ? "true" : "false");
  });
  updateCTA();
}

/* ============ Custom name ============ */
function onCustomFocus() {
  // Deselect any chip; the input is the source
  selectedName = null;
  document.querySelectorAll(".suggest").forEach(s => {
    s.classList.remove("is-selected");
    s.setAttribute("aria-checked", "false");
  });
}

function onCustomInput(e) {
  const v = e.target.value.trim();
  e.target.classList.toggle("is-custom-active", v.length > 0);
  selectedName = v.length > 0 ? v : null;
  updateCTA();
}

/* ============ Mode toggle ============ */
function setMode(next) {
  mode = next;
  el("modeSeg").dataset.mode = next;
  el("modeSeg").querySelectorAll(".seg-btn").forEach(b => {
    b.setAttribute("aria-selected", b.dataset.mode === next ? "true" : "false");
  });
  const isSched = next === "schedule";
  el("scheduleWrap").classList.toggle("is-open", isSched);
  el("nowWrap").classList.toggle("is-closed", isSched);

  if (isSched && !scheduledAt) {
    // Default: today, next round half hour + 30 min
    const d = roundedSoon(60);
    setScheduledAt(d);
  }
  updateCTA();
}

function roundedSoon(addMin) {
  const d = new Date();
  d.setMinutes(d.getMinutes() + addMin);
  // round up to nearest 15
  const m = d.getMinutes();
  d.setMinutes(Math.ceil(m / 15) * 15, 0, 0);
  return d;
}

function setScheduledAt(d) {
  scheduledAt = d;
  // Push to native inputs
  el("schedDate").value = toDateInput(d);
  el("schedTime").value = toTimeInput(d);
  el("schedDateLabel").textContent = friendlyDate(d);
  el("schedTimeLabel").textContent = friendlyTime(d);
  // Highlight quick chip if match
  updateQuickChipState();
  updateCTA();
}

function toDateInput(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const da = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${da}`;
}
function toTimeInput(d) {
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function onDateChange(e) {
  if (!e.target.value) return;
  const [y, m, da] = e.target.value.split("-").map(Number);
  const d = scheduledAt ? new Date(scheduledAt) : new Date();
  d.setFullYear(y, m - 1, da);
  setScheduledAt(d);
}
function onTimeChange(e) {
  if (!e.target.value) return;
  const [hh, mm] = e.target.value.split(":").map(Number);
  const d = scheduledAt ? new Date(scheduledAt) : new Date();
  d.setHours(hh, mm, 0, 0);
  setScheduledAt(d);
}

function quickPick(btn, addMin) {
  setScheduledAt(roundedSoon(addMin));
}
function quickPickTomorrow(btn) {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  d.setHours(19, 0, 0, 0);
  setScheduledAt(d);
}

function updateQuickChipState() {
  const chips = document.querySelectorAll(".quick-chip");
  chips.forEach(c => c.classList.remove("is-active"));
  if (!scheduledAt) return;
  const now = new Date();
  const diffMin = Math.round((scheduledAt - now) / 60000);
  chips.forEach(c => {
    const q = c.dataset.quick;
    if (q === "30" && diffMin >= 25 && diffMin <= 40) c.classList.add("is-active");
    if (q === "60" && diffMin >= 55 && diffMin <= 70) c.classList.add("is-active");
    if (q === "tom") {
      const t = new Date();
      t.setDate(t.getDate() + 1);
      if (scheduledAt.getDate() === t.getDate() &&
          scheduledAt.getHours() === 19 &&
          scheduledAt.getMinutes() === 0) c.classList.add("is-active");
    }
  });
}

/* ============ Formatting ============ */
function friendlyDate(d) {
  const today = new Date(); today.setHours(0,0,0,0);
  const tom = new Date(today); tom.setDate(tom.getDate() + 1);
  const day0 = new Date(d); day0.setHours(0,0,0,0);
  if (day0.getTime() === today.getTime()) return "Today";
  if (day0.getTime() === tom.getTime())   return "Tomorrow";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function friendlyTime(d) {
  return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}
function friendlyFull(d) {
  return `${friendlyDate(d)} · ${friendlyTime(d)}`;
}

/* ============ Live clock for "Now" panel ============ */
function tickClock() {
  const d = new Date();
  el("nowClock").textContent = friendlyTime(d);
  const longDate = d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
  el("nowDate").textContent = "Today · " + longDate;
}
setInterval(tickClock, 1000 * 15);

/* ============ CTA state ============ */
function updateCTA() {
  const cta = el("ctaBtn");
  const lbl = el("ctaLabel");
  const hasName = !!selectedName;
  const ready = hasName && (mode === "now" || !!scheduledAt);

  cta.classList.toggle("is-disabled", !ready);
  cta.disabled = !ready;

  if (!hasName) {
    lbl.textContent = "Pick a name to continue";
  } else if (mode === "now") {
    lbl.innerHTML = `Start session now <span class="btn-cta-meta">→</span>`;
  } else if (scheduledAt) {
    lbl.innerHTML = `Schedule for ${escapeHtml(friendlyFull(scheduledAt))} <span class="btn-cta-meta">→</span>`;
  } else {
    lbl.textContent = "Pick a time to continue";
  }
}

/* ============ Top-nav border on scroll ============ */
el("scrollEl").addEventListener("scroll", () => {
  el("topNav").classList.toggle("is-stuck", el("scrollEl").scrollTop > 4);
}, { passive: true });

/* ============ Actions ============ */
function onCancel() {
  // In real app: history.back() or close modal
  alert("Cancelled (demo)");
}
function onCreate() {
  if (!selectedName) return;
  const payload = {
    name: selectedName,
    startsAt: mode === "now" ? new Date().toISOString() : scheduledAt?.toISOString(),
    mode,
  };
  alert("Creating session:\n" + JSON.stringify(payload, null, 2));
}

/* ============ Theme ============ */
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "" : "dark";
  if (next) document.documentElement.setAttribute("data-theme", next);
  else document.documentElement.removeAttribute("data-theme");
}

/* ============ Init ============ */
tickClock();
loadSuggestions();
updateCTA();
</script>

</body>
</html>
