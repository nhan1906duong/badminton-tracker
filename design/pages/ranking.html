<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rankings">
<meta name="theme-color" content="#faf8f5">
<meta name="theme-color" content="#1e1a17" media="(prefers-color-scheme: dark)">
<title>Rankings — Player Leaderboard</title>
<style>
/* ================================================================
   TOKENS — Brutalist / Badminton Design System
   ================================================================ */
:root {
  --bg:       oklch(98%  0.004 240);
  --surface:  oklch(100% 0     0);
  --fg:       oklch(15%  0.02  100);
  --muted:    oklch(40%  0.02  100);
  --border:   oklch(15%  0.02  100);
  --accent:   oklch(60%  0.22  25);

  --font-display: 'Times New Roman', 'Iowan Old Style', Georgia, serif;
  --font-body:    ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, monospace;

  --danger:   oklch(55% 0.20 25);
  --success:  oklch(55% 0.14 145);

  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;
  --space-4: 16px;  --space-5: 24px;  --space-6: 32px;
  --space-7: 48px;  --space-8: 64px;

  --text-xs: 11px;  --text-sm: 13px;  --text-base: 15px;
  --text-lg: 18px;  --text-xl: 24px;  --text-2xl: 32px;
  --text-3xl: 48px;

  --radius-sm: 0px;  --radius-md: 2px;  --radius-lg: 4px;
  --border-width: 1.5px;
  --border-width-thick: 2px;

  --header-height: 52px;
  --nav-height: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --bg:       oklch(12%  0.02  100);
  --surface:  oklch(15%  0.018 100);
  --fg:       oklch(92%  0.004 95);
  --muted:    oklch(55%  0.008 95);
  --border:   oklch(40%  0.01  95);
  --accent:   oklch(65%  0.20  30);
  --danger:   oklch(60% 0.18 25);
  --success:  oklch(60% 0.14 145);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; overscroll-behavior-y: none; }

body {
  font-family: var(--font-body);
  font-size: var(--text-base);
  line-height: 1.55;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
}

button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; padding: 0; }
a { color: inherit; text-decoration: none; }

/* ================================================================
   PHONE FRAME
   ================================================================ */
.phone-frame {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100dvh;
  background: var(--bg);
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ================================================================
   HEADER
   ================================================================ */
.phone-header {
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--space-4);
  border-bottom: var(--border-width) solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
.phone-header-title {
  font-family: var(--font-display);
  font-size: var(--text-xl);
  font-weight: 700;
  line-height: 1.1;
}
.phone-header-action {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--accent);
}

/* ================================================================
   CONTENT
   ================================================================ */
.phone-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-4);
  padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + var(--space-4));
}

/* ================================================================
   RANKING PLAYER CARD (component/ranking-player-card.html)
   ================================================================ */
.rank-card {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) 0;
  border-bottom: 1px solid oklch(88% 0.008 50);
}
.rank-card:last-child {
  border-bottom: none;
}

/* ---- Ghost Number ---- */
.rank-card__ghost {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
  font-size: 36px;
  font-weight: 900;
  line-height: 1;
  width: 44px;
  text-align: center;
  flex-shrink: 0;
  letter-spacing: -0.04em;
  color: color-mix(in oklch, oklch(88% 0.008 50) 80%, transparent);
}
.rank-card__ghost--1 {
  color: color-mix(in oklch, oklch(55% 0.20 30) 35%, transparent);
}
.rank-card__ghost--2 {
  color: color-mix(in oklch, oklch(55% 0.20 30) 20%, transparent);
}

/* ---- Avatar ---- */
.rank-card__avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: color-mix(in oklch, var(--accent) 12%, white);
  color: var(--accent);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
[data-theme="dark"] .rank-card__avatar {
  background: color-mix(in oklch, var(--accent) 20%, var(--surface));
}

/* ---- Info ---- */
.rank-card__info {
  flex: 1;
  min-width: 0;
}
.rank-card__name {
  font-family: var(--font-display);
  font-size: var(--text-lg);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.01em;
}
.rank-card__meta {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--muted);
  margin-top: 2px;
}

/* ---- Points ---- */
.rank-card__points {
  font-family: var(--font-body);
  font-size: 20px;
  font-weight: 800;
  color: var(--fg);
  min-width: 64px;
  text-align: right;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
}

/* ================================================================
   BOTTOM NAV
   ================================================================ */
.phone-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: calc(var(--nav-height) + var(--safe-bottom));
  background: var(--surface);
  border-top: var(--border-width) solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-around;
  padding-top: 6px;
  z-index: 20;
}
.tab-nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: var(--space-2) var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-xs);
  color: var(--muted);
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.tab-nav-item--active {
  color: var(--fg);
  font-weight: 700;
}
.tab-nav-icon {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
}

/* ================================================================
   THEME TOGGLE
   ================================================================ */
.theme-toggle {
  position: fixed;
  top: max(var(--space-4), env(safe-area-inset-top) + var(--space-2));
  right: max(var(--space-4), env(safe-area-inset-right) + var(--space-2));
  padding: var(--space-2) var(--space-3);
  font-family: var(--font-body);
  font-size: var(--text-xs);
  font-weight: 600;
  background: var(--surface);
  border: var(--border-width) solid var(--border);
  color: var(--fg);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  min-height: 44px;
  min-width: 44px;
  touch-action: manipulation;
  z-index: 100;
}
.theme-toggle:active { opacity: 0.7; }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">Theme</button>

<div class="phone-frame">

  <!-- Header -->
  <div class="phone-header">
    <div class="phone-header-title">Rankings</div>
    <a href="#" class="phone-header-action">View All</a>
  </div>

  <!-- Content -->
  <div class="phone-content">
    <div class="rank-list" id="rankList"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="phone-nav">
    <a href="#" class="tab-nav-item">
      <div class="tab-nav-icon">&#8962;</div>
      <span>Home</span>
    </a>
    <a href="#" class="tab-nav-item">
      <div class="tab-nav-icon">&#9878;</div>
      <span>Sessions</span>
    </a>
    <a href="#" class="tab-nav-item tab-nav-item--active">
      <div class="tab-nav-icon">&#9733;</div>
      <span>Players</span>
    </a>
    <a href="#" class="tab-nav-item">
      <div class="tab-nav-icon">&#9881;</div>
      <span>Settings</span>
    </a>
  </div>

</div>

<script>
/* ---- Data ---- */
const players = [
  { name: 'Minh Tran',  initial: 'MT', matches: 24, wins: 18, points: 180 },
  { name: 'Tuan Nguyen', initial: 'TN', matches: 24, wins: 16, points: 160 },
  { name: 'Huy Le',     initial: 'HL', matches: 20, wins: 12, points: 120 },
  { name: 'Dat Pham',   initial: 'DP', matches: 18, wins: 9,  points: 90 },
  { name: 'Long Hoang', initial: 'LH', matches: 14, wins: 6,  points: 60 },
];

function calcRate(p) {
  return p.matches === 0 ? 0 : Math.round((p.wins / p.matches) * 100);
}

/* ---- Render card using component class names ---- */
function renderCard(p, rank) {
  const rate = calcRate(p);
  const ghostMod = rank <= 2 ? `rank-card__ghost--${rank}` : '';
  return `
    <div class="rank-card">
      <div class="rank-card__ghost ${ghostMod}">${rank}</div>
      <div class="rank-card__avatar">${p.initial}</div>
      <div class="rank-card__info">
        <div class="rank-card__name">${p.name}</div>
        <div class="rank-card__meta">${p.matches} matches &#183; ${rate}% rate</div>
      </div>
      <div class="rank-card__points">${p.points}</div>
    </div>
  `;
}

function renderList() {
  const sorted = [...players].sort((a, b) => b.points - a.points);
  document.getElementById('rankList').innerHTML = sorted
    .map((p, i) => renderCard(p, i + 1))
    .join('');
}

renderList();

/* ---- Theme ---- */
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? null : 'dark';
  if (next) html.setAttribute('data-theme', next);
  else html.removeAttribute('data-theme');
  localStorage.setItem('bt-theme', next || 'light');
}
const saved = localStorage.getItem('bt-theme');
if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
</script>

</body>
</html>
