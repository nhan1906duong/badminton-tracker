<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="35%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2d1a4a"/>
      <stop offset="100%" stop-color="#1a1816"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#863bff" flood-opacity="0.55"/>
    </filter>
    <filter id="textglow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#863bff" flood-opacity="0.4"/>
    </filter>
    <clipPath id="round">
      <rect x="0" y="0" width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow behind icon -->
  <ellipse cx="248" cy="315" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Lightning bolt icon (scaled from 48x46 to ~220x211, centered at 248,315) -->
  <g transform="translate(137, 209) scale(4.58)" filter="url(#shadow)">
    <path fill="#863bff" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
    <!-- Highlight sheen -->
    <path fill="#ffffff" fill-opacity="0.18" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h14c-.364 0-.706.177-.92.474L14.317 14.05c-.536.748 0 1.788.92 1.788h13.768c1.842 0 2.912 2.081 1.842 3.578l-7.48 10.471c-.536.748 0 1.788.92 1.788h5.659z"/>
  </g>

  <!-- Divider line -->
  <line x1="490" y1="210" x2="490" y2="420" stroke="#863bff" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- App name -->
  <text x="560" y="280" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="72" fill="#ffffff">Liên Quân</text>
  <text x="560" y="370" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="72" fill="#863bff">Cầu Lông</text>

  <!-- Tagline -->
  <text x="560" y="428" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="28" fill="#ffffff" fill-opacity="0.5">Theo dõi trận đấu · Bảng xếp hạng · Lịch sử</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="618" width="1200" height="12" fill="#863bff" opacity="0.7"/>
</svg>
